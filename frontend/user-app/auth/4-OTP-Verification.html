<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Taaza - Verify Email</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F59E0B",
                        "primary-light": "#FEF3C7",
                        "primary-dark": "#D97706",
                        "background-light": "#FFFBEB",
                        "background-dark": "#1E293B",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1E293B 0%, #1E3A6F 100%);
            font-family: 'Space Grotesk', sans-serif;
        }

        @media (max-width: 640px) {
            .taaza-title { font-size: 3rem !important; }
            .taaza-subtitle { font-size: 1.125rem !important; }
            .otp-input { width: 2.75rem !important; height: 3.25rem !important; font-size: 1.25rem !important; }
        }

        @media (max-width: 380px) {
            .taaza-title { font-size: 2.5rem !important; }
            .otp-input { width: 2.5rem !important; height: 3rem !important; font-size: 1.125rem !important; }
            .otp-container { gap: 0.375rem !important; }
        }

        .otp-input {
            width: 3rem;
            height: 3.5rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.8);
            color: #fff;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            caret-color: #F59E0B;
        }

        .otp-input:focus {
            outline: none;
            border-color: #F59E0B;
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
            transform: translateY(-2px);
        }

        .otp-input.filled {
            border-color: #F59E0B;
            background: rgba(245, 158, 11, 0.08);
        }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        a {
            -webkit-touch-callout: default;
            pointer-events: auto;
            cursor: pointer;
        }

        .shape-background {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .verify-btn {
            min-height: 48px;
            transition: all 0.3s ease;
        }

        .verify-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .verify-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
    </style>
</head>

<body class="font-display overflow-hidden">
    <div class="relative flex flex-col h-screen p-4 sm:p-6">
        <div class="shape-background"></div>

        <div class="flex-grow flex flex-col justify-center max-w-sm mx-auto w-full relative z-10">
            <!-- Logo -->
            <div class="text-center animate-fade-in">
                <h1 class="taaza-title text-4xl sm:text-5xl font-display font-bold uppercase tracking-wider text-white mb-2">
                    Taaza
                </h1>
                <p class="taaza-subtitle text-lg sm:text-xl text-primary font-medium mb-8 sm:mb-10">
                    Straight from the Farm to Your Door
                </p>
            </div>

            <!-- OTP Card -->
            <div class="form-card rounded-2xl p-5 sm:p-7 animate-slide-up">
                <!-- Icon + Title -->
                <div class="text-center mb-5">
                    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-3">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-semibold text-white mb-1">Verify Your Email</h2>
                    <p class="text-gray-400 text-sm">We sent a 6-digit code to</p>
                    <p class="text-primary font-semibold text-sm mt-1" id="emailDisplay"></p>
                </div>

                <!-- OTP Inputs -->
                <div class="otp-container mb-5">
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp1" aria-label="Digit 1" />
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp2" aria-label="Digit 2" />
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp3" aria-label="Digit 3" />
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp4" aria-label="Digit 4" />
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp5" aria-label="Digit 5" />
                    <input class="otp-input" type="number" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp6" aria-label="Digit 6" />
                </div>

                <!-- Error -->
                <div class="text-red-400 text-sm mb-4 text-center min-h-[1.25rem]" id="otpError"></div>

                <!-- Verify Button -->
                <button id="verifyBtn"
                    class="verify-btn w-full bg-primary text-background-dark font-bold py-3.5 rounded-xl text-base sm:text-lg shadow-lg disabled:opacity-50 disabled:transform-none">
                    <span id="verifyText">Verify & Continue</span>
                    <span id="verifySpinner" class="hidden inline-flex items-center justify-center">
                        <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Verifying...
                    </span>
                </button>

                <!-- Resend + Timer -->
                <div class="text-center mt-5">
                    <div class="text-gray-500 text-xs mb-2" id="timer"></div>
                    <button type="button" id="resendBtn"
                        class="text-primary font-semibold text-sm hover:text-primary-dark transition-colors disabled:text-gray-500 disabled:cursor-not-allowed">
                        Resend Code
                    </button>
                </div>

                <!-- Change email -->
                <div class="mt-5 pt-4 border-t border-white/5 text-center">
                    <a class="text-gray-400 text-sm hover:text-white transition-colors" href="3-Taaza-Login.html">
                        Use a different email
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resendTimer = 120;
        let timerInterval;

        const email = localStorage.getItem('loginEmail') || localStorage.getItem('registrationEmail');
        if (email) {
            document.getElementById('emailDisplay').textContent = email;
        } else {
            window.location.href = '3-Taaza-Login.html';
        }

        function startTimer() {
            const resendBtn = document.getElementById('resendBtn');
            const timerDiv = document.getElementById('timer');

            resendBtn.disabled = true;
            resendTimer = 120;

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            }

            timerDiv.textContent = `Code expires in ${formatTime(resendTimer)}`;

            timerInterval = setInterval(() => {
                resendTimer--;
                timerDiv.textContent = `Code expires in ${formatTime(resendTimer)}`;

                if (resendTimer <= 30) {
                    timerDiv.style.color = '#f87171';
                }

                if (resendTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerDiv.textContent = 'Code expired — request a new one';
                    timerDiv.style.color = '#f87171';
                }
            }, 1000);
        }

        startTimer();

        // OTP input logic
        const otpInputs = document.querySelectorAll('.otp-input');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function (e) {
                const value = e.target.value;

                if (value.length > 1) {
                    e.target.value = value.slice(-1);
                }

                if (!/^[0-9]$/.test(e.target.value)) {
                    e.target.value = '';
                    e.target.classList.remove('filled');
                    return;
                }

                e.target.classList.add('filled');

                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }

                // Auto-submit when all filled
                const otp = Array.from(otpInputs).map(i => i.value).join('');
                if (otp.length === 6) {
                    document.getElementById('verifyBtn').click();
                }
            });

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Backspace') {
                    if (!e.target.value && index > 0) {
                        otpInputs[index - 1].focus();
                        otpInputs[index - 1].value = '';
                        otpInputs[index - 1].classList.remove('filled');
                    } else {
                        e.target.classList.remove('filled');
                    }
                }
            });

            input.addEventListener('paste', function (e) {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text/plain');
                const digits = pasteData.replace(/[0-9]/g, '').length === 0 ? pasteData.slice(0, 6) : '';

                if (digits.length > 0) {
                    digits.split('').forEach((digit, i) => {
                        if (i < otpInputs.length) {
                            otpInputs[i].value = digit;
                            otpInputs[i].classList.add('filled');
                        }
                    });
                    const nextIndex = Math.min(digits.length, otpInputs.length - 1);
                    otpInputs[nextIndex].focus();
                }
            });

            input.addEventListener('focus', function () {
                this.select();
            });
        });

        setTimeout(() => otpInputs[0].focus(), 600);

        // Verify OTP
        document.getElementById('verifyBtn').addEventListener('click', async function () {
            const otpValue = Array.from(otpInputs).map(input => input.value).join('');
            const email = localStorage.getItem('loginEmail') || localStorage.getItem('registrationEmail');
            const isLogin = localStorage.getItem('loginEmail') !== null;

            document.getElementById('otpError').textContent = '';

            if (otpValue.length !== 6) {
                document.getElementById('otpError').textContent = 'Please enter the complete 6-digit code';
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            const verifyText = document.getElementById('verifyText');
            const verifySpinner = document.getElementById('verifySpinner');

            verifyBtn.disabled = true;
            verifyText.classList.add('hidden');
            verifySpinner.classList.remove('hidden');

            try {
                const endpoint = isLogin ? '/api/v1/users/login-verify-otp' : '/api/v1/users/verify-otp';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp: otpValue })
                });

                const data = await response.json();

                if (response.ok) {
                    verifySpinner.classList.add('hidden');
                    verifyText.innerHTML = '<svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Verified!';
                    verifyText.classList.remove('hidden');
                    verifyBtn.classList.remove('bg-primary');
                    verifyBtn.classList.add('bg-green-500');

                    setTimeout(() => {
                        localStorage.setItem('authToken', data.token);

                        if (data.isNewUser) {
                            window.location.href = '5-User-Registration.html';
                        } else {
                            localStorage.setItem('userName', data.user.name || 'User');
                            localStorage.setItem('userEmail', data.user.email);
                            localStorage.setItem('userMobile', data.user.mobile);
                            localStorage.removeItem('loginEmail');
                            window.location.href = '../pages/7-Homepage.html';
                        }
                    }, 800);
                } else {
                    document.getElementById('otpError').textContent = data.error || 'Invalid code. Please try again.';
                    verifySpinner.classList.add('hidden');
                    verifyText.textContent = 'Verify & Continue';
                    verifyText.classList.remove('hidden');
                    verifyBtn.disabled = false;

                    // Shake OTP inputs on error
                    otpInputs.forEach(input => {
                        input.style.borderColor = '#ef4444';
                        input.classList.remove('filled');
                        input.value = '';
                    });
                    setTimeout(() => {
                        otpInputs.forEach(input => input.style.borderColor = '');
                        otpInputs[0].focus();
                    }, 1000);
                }
            } catch (error) {
                document.getElementById('otpError').textContent = 'Network error. Please try again.';
                verifySpinner.classList.add('hidden');
                verifyText.textContent = 'Verify & Continue';
                verifyText.classList.remove('hidden');
                verifyBtn.disabled = false;
            }
        });

        // Resend OTP
        document.getElementById('resendBtn').addEventListener('click', async function () {
            const email = localStorage.getItem('loginEmail') || localStorage.getItem('registrationEmail');
            const isLogin = localStorage.getItem('loginEmail') !== null;

            try {
                const endpoint = isLogin ? '/api/v1/users/login-otp' : '/api/v1/users/start-registration';
                const body = isLogin ? { email } : { name: email.split('@')[0], email };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    startTimer();
                    document.getElementById('otpError').textContent = '';

                    const resendBtn = document.getElementById('resendBtn');
                    resendBtn.textContent = 'Code Sent!';
                    resendBtn.classList.add('text-green-400');
                    setTimeout(() => {
                        resendBtn.textContent = 'Resend Code';
                        resendBtn.classList.remove('text-green-400');
                    }, 2000);
                }
            } catch (error) {
                document.getElementById('otpError').textContent = 'Failed to resend. Please try again.';
            }
        });
    </script>
</body>

</html>
