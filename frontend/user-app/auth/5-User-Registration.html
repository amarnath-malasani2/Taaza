<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Taaza - Complete Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F59E0B",
                        "primary-light": "#FEF3C7",
                        "primary-dark": "#D97706",
                        "background-light": "#FFFBEB",
                        "background-dark": "#1E293B",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1E293B 0%, #1E3A6F 100%);
            font-family: 'Space Grotesk', sans-serif;
        }

        @media (max-width: 640px) {
            .taaza-title { font-size: 3rem !important; }
            .taaza-subtitle { font-size: 1.125rem !important; }
            .reg-input { height: 3.25rem !important; font-size: 1rem !important; }
            .reg-button { min-height: 3.25rem !important; font-size: 1.125rem !important; }
        }

        @media (max-width: 380px) {
            .taaza-title { font-size: 2.5rem !important; }
        }

        .reg-input {
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
            transition: all 0.3s ease;
        }

        .reg-input:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
            border-color: #F59E0B;
        }

        .reg-button {
            min-height: 48px;
            transition: all 0.3s ease;
        }

        .reg-button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .reg-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        a {
            -webkit-touch-callout: default;
            pointer-events: auto;
            cursor: pointer;
        }

        .shape-background {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .error-message {
            color: #f87171;
            font-size: 0.75rem;
            margin-top: 0.375rem;
            padding-left: 0.25rem;
            display: none;
        }

        .input-valid {
            border-color: #22c55e !important;
        }

        .input-invalid {
            border-color: #ef4444 !important;
        }
    </style>
</head>

<body class="font-display overflow-hidden">
    <div class="relative flex flex-col h-screen p-4 sm:p-6">
        <div class="shape-background"></div>

        <div class="flex-grow flex flex-col justify-center max-w-sm mx-auto w-full relative z-10">
            <!-- Logo -->
            <div class="text-center animate-fade-in">
                <h1 class="taaza-title text-4xl sm:text-5xl font-display font-bold uppercase tracking-wider text-white mb-2">
                    Taaza
                </h1>
                <p class="taaza-subtitle text-lg sm:text-xl text-primary font-medium mb-8 sm:mb-10">
                    Straight from the Farm to Your Door
                </p>
            </div>

            <!-- Form Card -->
            <div class="form-card rounded-2xl p-5 sm:p-7 animate-slide-up">
                <!-- Icon + Title -->
                <div class="text-center mb-5">
                    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-3">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-semibold text-white mb-1">Complete Your Profile</h2>
                    <p class="text-gray-400 text-sm">Just a few details to get you started</p>
                </div>

                <form id="registrationForm">
                    <!-- Name Input -->
                    <div class="mb-4">
                        <label class="text-gray-400 text-xs font-medium mb-1.5 block pl-0.5">Full Name</label>
                        <div class="relative">
                            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input id="fullName"
                                class="reg-input form-input w-full rounded-xl h-12 sm:h-14 pl-11 pr-4 bg-background-dark/80 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                placeholder="Enter your full name" type="text" autocomplete="name" maxlength="50" required />
                        </div>
                        <div id="nameError" class="error-message">Please enter a valid name (letters only, min 2 characters)</div>
                    </div>

                    <!-- Mobile Input -->
                    <div class="mb-5">
                        <label class="text-gray-400 text-xs font-medium mb-1.5 block pl-0.5">Mobile Number</label>
                        <div class="relative">
                            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                </svg>
                            </div>
                            <input id="mobileNumber"
                                class="reg-input form-input w-full rounded-xl h-12 sm:h-14 pl-11 pr-4 bg-background-dark/80 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                placeholder="10-digit mobile number" type="tel" autocomplete="tel" maxlength="10" required />
                        </div>
                        <div id="mobileError" class="error-message">Please enter a valid 10-digit mobile number</div>
                    </div>

                    <!-- General Error -->
                    <div id="generalError" class="text-red-400 text-sm mb-4 text-center min-h-[1.25rem]" style="display: none;"></div>

                    <!-- Submit Button -->
                    <button type="submit" id="continueBtn"
                        class="reg-button w-full bg-primary text-background-dark font-bold py-3.5 rounded-xl text-base sm:text-lg shadow-lg disabled:opacity-50 disabled:transform-none">
                        <span id="continueText">Continue to Taaza</span>
                        <span id="continueSpinner" class="hidden inline-flex items-center justify-center">
                            <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            Setting up...
                        </span>
                    </button>
                </form>

                <!-- Back link -->
                <div class="mt-5 pt-4 border-t border-white/5 text-center">
                    <a class="text-gray-400 text-sm hover:text-white transition-colors" href="3-Taaza-Login.html">
                        Use a different email
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('registrationForm');
            const nameInput = document.getElementById('fullName');
            const mobileInput = document.getElementById('mobileNumber');
            const continueBtn = document.getElementById('continueBtn');
            const nameError = document.getElementById('nameError');
            const mobileError = document.getElementById('mobileError');

            setTimeout(() => nameInput.focus(), 600);

            function validateName(name) {
                return name.length >= 2 && /^[a-zA-Z\s]+$/.test(name);
            }

            function validateMobile(mobile) {
                return /^[6-9]\d{9}$/.test(mobile);
            }

            nameInput.addEventListener('input', function (e) {
                const value = e.target.value.trim();
                if (value.length > 0) {
                    if (validateName(value)) {
                        nameError.style.display = 'none';
                        e.target.classList.remove('input-invalid');
                        e.target.classList.add('input-valid');
                    } else {
                        nameError.style.display = 'block';
                        e.target.classList.remove('input-valid');
                        e.target.classList.add('input-invalid');
                    }
                } else {
                    nameError.style.display = 'none';
                    e.target.classList.remove('input-invalid', 'input-valid');
                }
            });

            mobileInput.addEventListener('input', function (e) {
                e.target.value = e.target.value.replace(/\D/g, '');
                const value = e.target.value;

                if (value.length > 0) {
                    if (validateMobile(value)) {
                        mobileError.style.display = 'none';
                        e.target.classList.remove('input-invalid');
                        e.target.classList.add('input-valid');
                    } else if (value.length >= 10) {
                        mobileError.style.display = 'block';
                        e.target.classList.remove('input-valid');
                        e.target.classList.add('input-invalid');
                    } else {
                        mobileError.style.display = 'none';
                        e.target.classList.remove('input-invalid', 'input-valid');
                    }
                } else {
                    mobileError.style.display = 'none';
                    e.target.classList.remove('input-invalid', 'input-valid');
                }
            });

            nameInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    mobileInput.focus();
                }
            });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const fullName = nameInput.value.trim();
                const mobileNumber = mobileInput.value.trim();
                const email = localStorage.getItem('loginEmail');

                if (!email) {
                    const generalError = document.getElementById('generalError');
                    generalError.textContent = 'Session expired. Redirecting to login...';
                    generalError.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '3-Taaza-Login.html';
                    }, 1500);
                    return;
                }

                let isValid = true;

                if (!fullName || !validateName(fullName)) {
                    nameError.style.display = 'block';
                    nameInput.classList.add('input-invalid');
                    nameInput.focus();
                    isValid = false;
                } else {
                    nameError.style.display = 'none';
                }

                if (!mobileNumber || !validateMobile(mobileNumber)) {
                    mobileError.style.display = 'block';
                    mobileInput.classList.add('input-invalid');
                    if (isValid) mobileInput.focus();
                    isValid = false;
                } else {
                    mobileError.style.display = 'none';
                }

                if (!isValid) return;

                const continueText = document.getElementById('continueText');
                const continueSpinner = document.getElementById('continueSpinner');

                continueBtn.disabled = true;
                continueText.classList.add('hidden');
                continueSpinner.classList.remove('hidden');

                try {
                    const response = await fetch('/api/v1/users/complete-profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email,
                            name: fullName,
                            mobile: mobileNumber
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('userName', fullName);
                        localStorage.setItem('userMobile', mobileNumber);
                        localStorage.removeItem('loginEmail');

                        continueSpinner.classList.add('hidden');
                        continueText.innerHTML = '<svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Done!';
                        continueText.classList.remove('hidden');
                        continueBtn.classList.remove('bg-primary');
                        continueBtn.classList.add('bg-green-500');

                        setTimeout(() => {
                            window.location.href = '../pages/7-Homepage.html';
                        }, 800);
                    } else {
                        throw new Error(data.error || 'Registration failed');
                    }
                } catch (error) {
                    const generalError = document.getElementById('generalError');
                    generalError.textContent = error.message;
                    generalError.style.display = 'block';

                    continueSpinner.classList.add('hidden');
                    continueText.classList.remove('hidden');
                    continueBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
