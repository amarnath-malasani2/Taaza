<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Taaza Login</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F59E0B",
                        "primary-light": "#FEF3C7",
                        "primary-dark": "#D97706",
                        "background-light": "#FFFBEB",
                        "background-dark": "#1E293B",
                        "accent-blue": "#1E40AF",
                        "foreground-light": "#E0E0E0",
                        "foreground-dark": "#E0E0E0",
                        "input-dark": "#1F3A66",
                        "input-border-dark": "#3B5998",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1E293B 0%, #1E3A6F 100%);
        }

        @media (max-width: 640px) {
            .taaza-title { font-size: 3rem !important; }
            .taaza-subtitle { font-size: 1.125rem !important; padding: 0 1rem; }
            .login-input { padding: 1rem 1rem 1rem 2.75rem !important; font-size: 1rem !important; height: 3.5rem !important; }
            .login-button { padding: 1rem !important; font-size: 1.125rem !important; min-height: 3.5rem !important; }
        }

        @media (max-width: 480px) {
            .taaza-title { font-size: 2.5rem !important; }
            .taaza-subtitle { font-size: 1rem !important; }
        }

        .login-input {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            min-height: 48px;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
            border-color: #F59E0B;
        }

        .login-button {
            min-height: 48px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .login-button:active {
            transform: scale(0.98);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        a {
            -webkit-touch-callout: default;
            pointer-events: auto;
            cursor: pointer;
        }

        .shape-background {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            padding-left: 0.25rem;
        }

        .form-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }
    </style>
</head>

<body class="font-display overflow-hidden">
    <div class="relative flex flex-col h-screen p-4 sm:p-6">
        <div class="shape-background"></div>

        <div class="flex-grow flex flex-col justify-center max-w-sm mx-auto w-full relative z-10">
            <!-- Logo -->
            <div class="text-center animate-fade-in">
                <h1 class="taaza-title text-4xl sm:text-5xl md:text-6xl font-display font-bold uppercase tracking-wider text-white mb-2 logo-glow">
                    Taaza
                </h1>
                <p class="taaza-subtitle text-lg sm:text-xl text-primary font-medium max-w-sm mx-auto px-4 mb-10 sm:mb-12">
                    Straight from the Farm to Your Door
                </p>
            </div>

            <!-- Form Card -->
            <div class="form-card rounded-2xl p-6 sm:p-8 animate-slide-up">
                <h2 class="text-xl sm:text-2xl font-semibold text-white mb-2 text-center">Welcome Back</h2>
                <p class="text-gray-400 text-sm text-center mb-6">Enter your email to get started</p>

                <form id="registrationForm">
                    <div class="relative mb-5">
                        <!-- Email icon -->
                        <div class="absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input id="emailInput"
                            class="login-input form-input w-full rounded-xl h-12 sm:h-14 pl-11 pr-4 bg-background-dark/80 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                            placeholder="you@example.com" type="email" autocomplete="email" required />
                        <div class="error" id="emailError"></div>
                    </div>

                    <button type="submit" id="sendOtpBtn"
                        class="login-button w-full bg-primary text-background-dark font-bold py-3.5 sm:py-4 rounded-xl text-base sm:text-lg shadow-lg disabled:opacity-50 disabled:transform-none">
                        <span id="btnText">Send OTP</span>
                        <div id="btnSpinner" class="hidden inline-flex items-center justify-center">
                            <div class="animate-spin rounded-full h-5 w-5 border-2 border-background-dark border-t-transparent mr-2"></div>
                            Sending...
                        </div>
                    </button>
                </form>
            </div>
        </div>

        <!-- Terms -->
        <p class="text-center pb-4 px-4 relative z-10">
            <a class="font-semibold text-primary hover:text-primary-dark underline underline-offset-2 transition-colors text-xs sm:text-sm"
                href="terms-conditions.html">Terms & Conditions</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const emailInput = document.getElementById('emailInput');
            setTimeout(() => emailInput.focus(), 600);
        });

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('emailInput').value.trim();
            const btn = document.getElementById('sendOtpBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            document.getElementById('emailError').textContent = '';

            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                return;
            }

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            try {
                const response = await fetch('/api/v1/users/login-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('loginEmail', email);
                    window.location.href = '4-OTP-Verification.html';
                } else {
                    document.getElementById('emailError').innerHTML = `
                        ${data.error || 'Login failed'}
                        <button onclick="location.reload()" class="ml-2 underline text-primary">Retry</button>
                    `;
                }
            } catch (error) {
                document.getElementById('emailError').innerHTML = `
                    Network error. Please try again.
                    <button onclick="location.reload()" class="ml-2 underline text-primary">Retry</button>
                `;
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
