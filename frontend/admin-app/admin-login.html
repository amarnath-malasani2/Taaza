<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taaza Admin Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1E293B 0%, #1E3A6F 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        @keyframes fallDown {
            0% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
            60% {
                transform: translateY(10px) scale(1.1);
            }
            80% {
                transform: translateY(-5px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .letter {
            display: inline-block;
            opacity: 0;
            animation: fallDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .letter:nth-child(1) { animation-delay: 0.1s; }
        .letter:nth-child(2) { animation-delay: 0.2s; }
        .letter:nth-child(3) { animation-delay: 0.3s; }
        .letter:nth-child(4) { animation-delay: 0.4s; }
        .letter:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease-out forwards 0.8s;
            opacity: 0;
        }

        .glow-text {
            text-shadow: 0 0 40px rgba(245, 158, 11, 0.6),
                         0 0 80px rgba(245, 158, 11, 0.4),
                         0 0 120px rgba(245, 158, 11, 0.2);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(245, 158, 11, 0.5);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Animated Background Shapes -->
    <div class="absolute top-20 right-20 w-96 h-96 bg-amber-500/20 rounded-full blur-3xl float-animation"></div>
    <div class="absolute bottom-20 left-20 w-[500px] h-[500px] bg-amber-500/15 rounded-full blur-3xl" style="animation: float 4s ease-in-out infinite; animation-delay: 1.5s;"></div>
    <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] bg-blue-400/10 rounded-full blur-3xl" style="animation: float 5s ease-in-out infinite; animation-delay: 2.5s;"></div>

    <div class="w-full max-w-sm mx-auto relative z-10 px-4">
        <!-- Brand Name -->
        <div class="text-center mb-6">
            <h1 class="text-5xl font-black uppercase tracking-tight text-amber-400 glow-text mb-2">
                <span class="letter">T</span><span class="letter">A</span><span class="letter">A</span><span class="letter">Z</span><span class="letter">A</span>
            </h1>
            <p class="text-lg text-white font-bold animate-fadeInUp">Admin Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl p-6 border border-white/20 animate-fadeInUp">
            <div class="mb-5 text-center">
                <h3 class="text-xl font-bold text-white mb-1">Welcome Back</h3>
                <p class="text-gray-300 text-sm">Sign in to access the dashboard</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <!-- Email -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                        </svg>
                    </div>
                    <input id="email" type="email"
                        class="input-field w-full pl-11 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-white placeholder-gray-400"
                        placeholder="admin@taaza.com" required autocomplete="email">
                </div>

                <!-- Password -->
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input id="password" type="password"
                        class="input-field w-full pl-11 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-white placeholder-gray-400"
                        placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <!-- Remember Me -->
                <label class="flex items-center gap-2 cursor-pointer">
                    <input id="remember" type="checkbox" class="w-4 h-4 text-amber-500 border-gray-300 rounded focus:ring-amber-500">
                    <span class="text-sm text-gray-300">Remember me</span>
                </label>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-2 rounded-xl text-sm"></div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn"
                    class="btn-login w-full py-3 text-white font-bold rounded-xl shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Sign In to Dashboard</span>
                    <span id="btnSpinner" class="hidden inline-flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Signing in...
                    </span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin.replace(':3001', ':8080');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Hide previous errors
            errorDiv.classList.add('hidden');

            // Show loading state
            loginBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/v1/admin/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token and admin info
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminInfo', JSON.stringify(data.admin));

                    if (remember) {
                        localStorage.setItem('adminRememberMe', 'true');
                    }

                    // Show success and redirect
                    btnSpinner.classList.add('hidden');
                    btnText.textContent = '✓ Success! Redirecting...';
                    btnText.classList.remove('hidden');
                    loginBtn.classList.remove('btn-login');
                    loginBtn.classList.add('bg-green-500');

                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');

                // Reset button
                loginBtn.disabled = false;
                btnSpinner.classList.add('hidden');
                btnText.textContent = 'Sign In to Dashboard';
                btnText.classList.remove('hidden');

                // Shake animation on error
                loginBtn.classList.add('animate-pulse');
                setTimeout(() => loginBtn.classList.remove('animate-pulse'), 500);
            }
        });

        // Auto-focus email field
        document.getElementById('email').focus();

        // Load remembered email if exists
        const rememberedEmail = localStorage.getItem('adminRememberMe');
        if (rememberedEmail === 'true') {
            const adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
            if (adminInfo.email) {
                document.getElementById('email').value = adminInfo.email;
                document.getElementById('remember').checked = true;
                document.getElementById('password').focus();
            }
        }
    </script>
</body>

</html>
